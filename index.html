<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raffle Wheel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --navy: #0D0F1A; --navy2: #1E2235; --navy3: #252A40;
      --gold: #F5C842; --gold2: #C9A028; --gold-glow: rgba(245, 200, 66, 0.18);
      --cream: #F0EDE6; --cream2: #B8B4AE; --coral: #E8624A;
      --green: #3DBF8A; --white: #FFFFFF;
      --r: 12px; --r2: 8px;
    }
    
    body, html {
      width: 100vw; height: 100vh;
      background-color: var(--navy);
      color: var(--cream);
      overflow-x: hidden;
    }

    .app {
      display: flex;
      flex-direction: row;
      height: 100vh; width: 100vw;
      background: var(--navy);
      font-family: 'Inter', sans-serif;
    }

    /* Left Side: The Wheel */
    .stage {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px; background: var(--navy); position: relative; gap: 30px;
      overflow-y: auto;
    }

    .stage::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(245, 200, 66, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .wordmark {
      font-family: 'Playfair Display', serif; font-size: 14px; letter-spacing: 0.3em;
      color: var(--gold); text-transform: uppercase; opacity: 0.8; margin-bottom: -10px;
    }

    /* Scalable Canvas Container */
    .wheel-container { 
      position: relative; display: flex; align-items: center; justify-content: center; 
      width: 100%; max-width: 460px; aspect-ratio: 1 / 1;
    }
    
    .wheel-glow {
      position: absolute; inset: -40px; border-radius: 50%;
      background: radial-gradient(ellipse, var(--gold-glow) 0%, transparent 70%);
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .wheel-glow.active { opacity: 1; }
    
    canvas#wc { 
      width: 100%; height: 100%; 
      display: block; border-radius: 50%; 
    }
    
    .pointer-wrap {
      position: absolute; right: -20px; top: 50%;
      transform: translateY(-50%) scale(1.4); z-index: 10;
    }
    .pointer-wrap svg { filter: drop-shadow(0 0 6px var(--gold)); }

    .spin-area { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; z-index: 5; }
    
    .spin-btn {
      width: 240px; padding: 16px 0; font-family: 'Inter', sans-serif; font-size: 16px;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--gold); color: var(--navy); border: none; border-radius: var(--r2);
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 0 0 0 var(--gold-glow);
    }
    .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 24px var(--gold-glow); }
    .spin-btn:active:not(:disabled) { transform: scale(0.97); }
    .spin-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Stats Bar */
    .stats-bar {
      display: flex; gap: 32px; justify-content: center; align-items: center;
      background: rgba(255, 255, 255, 0.03); padding: 12px 24px; border-radius: var(--r);
      border: 0.5px solid rgba(255, 255, 255, 0.05); flex-wrap: wrap;
    }
    .stat-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .stat-val { font-size: 20px; font-weight: 700; color: var(--cream); }
    .stat-val.gold { color: var(--gold); }
    .stat-label { font-size: 10px; color: var(--cream2); text-transform: uppercase; letter-spacing: 0.08em; }
    
    .alloc-input {
      width: 54px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.15);
      color: var(--gold); font-size: 18px; font-weight: 700; text-align: center;
      border-radius: 6px; outline: none; padding: 2px; font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .alloc-input:focus { border-color: var(--gold); background: rgba(245, 200, 66, 0.1); }
    .alloc-input::-webkit-outer-spin-button, .alloc-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* Right Side: Panel */
    .panel {
      width: 340px; min-width: 340px; background: var(--navy2); display: flex; flex-direction: column;
      border-left: 0.5px solid rgba(255, 255, 255, 0.07); height: 100vh;
    }
    .panel-top { padding: 24px 20px 0; }
    .panel-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--cream); margin-bottom: 16px; }
    
    .field-group { display: flex; gap: 8px; margin-bottom: 8px; }
    .field-group input {
      background: var(--navy3); border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--r2); padding: 10px 12px; font-family: 'Inter', sans-serif;
      font-size: 13px; color: var(--cream); outline: none; transition: border-color 0.15s;
    }
    .field-group input:focus { border-color: var(--gold); }
    .field-group input::placeholder { color: rgba(176, 172, 166, 0.4); }
    .field-group input[type=number] { width: 72px; flex: none; }
    .field-group input[type=text] { flex: 1; min-width: 0; }
    
    .add-btn {
      padding: 10px 16px; background: var(--gold); color: var(--navy);
      border: none; border-radius: var(--r2); font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 600; letter-spacing: 0.06em; cursor: pointer;
      text-transform: uppercase; white-space: nowrap; transition: opacity 0.15s;
    }
    .add-btn:hover { opacity: 0.88; }
    
    .divider { height: 0.5px; background: rgba(255, 255, 255, 0.07); margin: 16px 20px; flex-shrink: 0; }
    .section-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cream2); margin-bottom: 10px; padding: 0 20px; flex-shrink: 0;}
    
    .entries-scroll { flex: 1; overflow-y: auto; padding: 0 20px 12px; min-height: 100px; }
    .entries-scroll::-webkit-scrollbar, .log-scroll::-webkit-scrollbar { width: 4px; }
    .entries-scroll::-webkit-scrollbar-track, .log-scroll::-webkit-scrollbar-track { background: transparent; }
    .entries-scroll::-webkit-scrollbar-thumb, .log-scroll::-webkit-scrollbar-thumb { background: var(--navy3); border-radius: 2px; }
    
    .entry-row {
      display: flex; justify-content: space-between; align-items: center; padding: 8px 12px;
      background: var(--navy3); border-radius: 6px; margin-bottom: 6px; border: 0.5px solid rgba(255, 255, 255, 0.05);
    }
    .entry-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
    .entry-name { font-size: 13px; color: var(--cream); font-weight: 500; }
    .entry-badges { display: flex; align-items: center; gap: 8px; }
    .entry-tag { font-size: 11px; color: var(--gold); background: rgba(245, 200, 66, 0.1); border: 0.5px solid rgba(245, 200, 66, 0.2); padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    
    .rm-btn { background: none; border: none; cursor: pointer; color: rgba(176, 172, 166, 0.4); font-size: 15px; line-height: 1; padding: 2px 4px; border-radius: 4px; transition: color 0.15s, background 0.15s; }
    .rm-btn:hover { color: var(--coral); background: rgba(232, 98, 74, 0.12); }
    .empty-msg { font-size: 12px; color: rgba(176, 172, 166, 0.4); text-align: center; padding: 20px 0; }
    
    .winner-panel {
      margin: 0 20px 16px; padding: 16px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(245, 200, 66, 0.12), rgba(245, 200, 66, 0.04));
      border: 0.5px solid rgba(245, 200, 66, 0.3); border-radius: var(--r); display: none;
    }
    .winner-eyebrow { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    .winner-name-display { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--cream); line-height: 1.2; margin-bottom: 16px; }
    .winner-actions { display: flex; gap: 8px; }
    
    .w-btn { flex: 1; padding: 10px 0; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: opacity 0.15s; }
    .w-btn:hover { opacity: 0.8; }
    .w-btn-keep { background: transparent; border: 0.5px solid rgba(255, 255, 255, 0.15); color: var(--cream2); }
    .w-btn-remove { background: rgba(232, 98, 74, 0.15); border: 0.5px solid rgba(232, 98, 74, 0.3); color: var(--coral); }
    
    .log-section { padding: 0 20px 20px; flex: 1; display: flex; flex-direction: column; min-height: 100px; }
    .log-scroll { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 6px; padding-right: 4px; }
    .log-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: rgba(255, 255, 255, 0.03); border-radius: 6px; border: 0.5px solid rgba(255, 255, 255, 0.04); }
    .log-num { font-size: 11px; color: var(--gold); font-weight: 600; width: 18px; text-align: center; flex-shrink: 0; }
    .log-name { font-size: 13px; color: var(--cream); flex: 1; font-weight: 500; }
    .log-time { font-size: 11px; color: var(--cream2); }

    @keyframes winnerpop { 0% { transform: scale(0.94); opacity: 0 } 60% { transform: scale(1.02) } 100% { transform: scale(1); opacity: 1 } }
    .winner-panel.show { display: block; animation: winnerpop 0.35s ease forwards; }
    @keyframes glowpulse { 0%, 100% { opacity: 0.6 } 50% { opacity: 1 } }
    .wheel-glow.spinning { animation: glowpulse 0.6s ease-in-out infinite; }

    /* Make it responsive for smaller screens */
    @media (max-width: 800px) {
      .app { flex-direction: column; height: auto; }
      .panel { width: 100%; height: auto; min-height: 60vh; border-left: none; border-top: 0.5px solid rgba(255, 255, 255, 0.07); }
      .stage { min-height: 60vh; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="stage">
    <div class="wordmark">Raffle Wheel</div>
    
    <div class="wheel-container">
      <div class="wheel-glow" id="glowEl"></div>
      <canvas id="wc" width="460" height="460"></canvas>
      <div class="pointer-wrap">
        <svg width="22" height="32" viewBox="0 0 22 32">
          <polygon points="22,0 22,32 0,16" fill="#F5C842"/>
        </svg>
      </div>
    </div>
    
    <div class="spin-area">
      <button class="spin-btn" id="spinBtn" onclick="doSpin()">Spin</button>
      
      <div class="stats-bar">
        <div class="stat-col">
          <span class="stat-val" id="ticketCountVal">0</span>
          <span class="stat-label">Entries</span>
        </div>
        <div class="stat-col">
          <div style="display:flex; align-items:center; gap:2px;">
            <input type="number" class="alloc-input" id="allocIn" value="5" min="1" max="100" oninput="updateCount()" />
            <span style="color:var(--gold); font-weight:700; font-size:16px;">%</span>
          </div>
          <span class="stat-label">Allocation</span>
        </div>
        <div class="stat-col">
          <span class="stat-val gold" id="winnerCountVal">0</span>
          <span class="stat-label">Possible Winners</span>
        </div>
      </div>
      
    </div>
  </div>

  <div class="panel">
    <div class="panel-top">
      <div class="panel-title">Participants</div>
      <div class="field-group">
        <input type="text" id="nameIn" placeholder="Full name" />
        <input type="number" id="entriesIn" placeholder="#" min="1" value="1" />
        <button class="add-btn" onclick="addEntry()">Add</button>
      </div>
    </div>

    <div class="divider"></div>
    <div class="section-label">In the draw</div>
    <div class="entries-scroll" id="entryList"><div class="empty-msg">No participants yet</div></div>

    <div class="winner-panel" id="winnerPanel">
      <div class="winner-eyebrow">🏆 Winner</div>
      <div class="winner-name-display" id="winnerDisplay"></div>
      <div class="winner-actions">
        <button class="w-btn w-btn-keep" onclick="dismissWinner()">Keep in draw</button>
        <button class="w-btn w-btn-remove" onclick="removeWinner()">Remove entry</button>
      </div>
    </div>

    <div class="divider" style="margin-top:0;"></div>
    <div class="section-label">Winner log</div>
    <div class="log-section">
      <div class="log-scroll" id="logList"><div class="empty-msg">No draws yet</div></div>
    </div>
  </div>
</div>

<script>
const SLICE_COLORS = [
  '#534AB7','#0F6E56','#C05621','#185FA5','#7C3D7C','#0E6B6B',
  '#8B5E0A','#5F5E5A','#992233','#1A5276','#1E8449','#784212',
  '#6C3483','#0B5345','#7B241C','#154360','#145A32','#5D4037',
];

let participants=[], wheelSlots=[], currentAngle=0, spinning=false, winnerIdx=null, logEntries=[], logCount=0;
let canvas, ctx, glowEl;

function buildSlots(){
  wheelSlots=[];
  participants.forEach((p,pi)=>{
    for(let i=0; i<p.entries; i++) wheelSlots.push({name:p.name, ci:pi%SLICE_COLORS.length});
  });
}

function drawWheel(angle){
  ctx.clearRect(0,0,460,460);
  const cx=230, cy=230, r=215; 
  
  // Empty State
  if(!wheelSlots.length){
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#252A40'; // Brightened for visibility
    ctx.fill();
    ctx.strokeStyle='rgba(245,200,66,0.3)'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#FFFFFF'; ctx.font='500 18px Inter,sans-serif'; ctx.textAlign='center';
    ctx.fillText('Add participants to begin',cx,cy+6);
    return;
  }
  
  const sa=(Math.PI*2)/wheelSlots.length;
  wheelSlots.forEach((s,i)=>{
    const a0=angle+i*sa, a1=a0+sa;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a0,a1); ctx.closePath();
    ctx.fillStyle=SLICE_COLORS[s.ci]; ctx.fill();
    ctx.strokeStyle='rgba(13,15,26,0.6)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(a0+sa/2);
    ctx.textAlign='right';
    const fs=wheelSlots.length>22?12:wheelSlots.length>12?14:16;
    ctx.font=`500 ${fs}px Inter,sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.92)';
    let lbl=s.name;
    const maxW=r-35;
    while(ctx.measureText(lbl).width>maxW && lbl.length>2) lbl=lbl.slice(0,-1);
    if(lbl!==s.name) lbl=lbl.slice(0,-1)+'…';
    ctx.fillText(lbl,r-15,fs/3);
    ctx.restore();
  });
  
  ctx.beginPath(); ctx.arc(cx,cy,32,0,Math.PI*2);
  ctx.fillStyle='#0D0F1A'; ctx.fill();
  ctx.strokeStyle='rgba(245,200,66,0.4)'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,10,0,Math.PI*2);
  ctx.fillStyle='#F5C842'; ctx.fill();
}

function addEntry(){
  const nameInp = document.getElementById('nameIn');
  const entInp = document.getElementById('entriesIn');
  const name = nameInp.value.trim();
  const entries = parseInt(entInp.value) || 1;
  
  if(!name){ nameInp.focus(); return; }
  
  const ex = participants.find(p=>p.name.toLowerCase()===name.toLowerCase());
  if(ex) ex.entries += entries;
  else participants.push({name, entries});
  
  nameInp.value = '';
  entInp.value = '1';
  nameInp.focus();
  
  buildSlots(); drawWheel(currentAngle); renderEntries(); updateCount();
}

function removeParticipant(i){
  participants.splice(i,1);
  buildSlots(); drawWheel(currentAngle); renderEntries(); updateCount();
}

function renderEntries(){
  const el=document.getElementById('entryList');
  if(!participants.length){el.innerHTML='<div class="empty-msg">No participants yet</div>';return;}
  el.innerHTML=participants.map((p,i)=>`
    <div class="entry-row">
      <div style="display:flex;align-items:center;min-width:0;">
        <div class="entry-dot" style="background:${SLICE_COLORS[i%SLICE_COLORS.length]};"></div>
        <span class="entry-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</span>
      </div>
      <div class="entry-badges">
        <span class="entry-tag">${p.entries}×</span>
        <button class="rm-btn" onclick="removeParticipant(${i})" title="Remove">✕</button>
      </div>
    </div>`).join('');
}

function updateCount(){
  const total = participants.reduce((s,p) => s + p.entries, 0);
  document.getElementById('ticketCountVal').textContent = total;
  
  const alloc = parseFloat(document.getElementById('allocIn').value) || 0;
  const possibleWinners = Math.floor((total * alloc) / 100);
  document.getElementById('winnerCountVal').textContent = possibleWinners;
}

function doSpin(){
  if(spinning || !wheelSlots.length) return;
  spinning=true; winnerIdx=null;
  document.getElementById('winnerPanel').className='winner-panel';
  document.getElementById('spinBtn').disabled=true;
  glowEl.className='wheel-glow active spinning';
  
  const rot=(Math.PI*2)*(6+Math.random()*6);
  const dur=4500+Math.random()*1500;
  const t0=performance.now(), a0=currentAngle;
  
  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    currentAngle=a0+rot*ease(t);
    drawWheel(currentAngle);
    if(t<1){requestAnimationFrame(frame);return;}
    
    spinning=false;
    glowEl.className='wheel-glow active';
    document.getElementById('spinBtn').disabled=false;
    
    const sa=(Math.PI*2)/wheelSlots.length;
    const ptr=Math.PI; 
    let norm=((ptr-currentAngle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
    winnerIdx=Math.floor(norm/sa)%wheelSlots.length;
    showWinner(wheelSlots[winnerIdx].name);
    setTimeout(()=>{glowEl.className='wheel-glow';},2000);
  }
  requestAnimationFrame(frame);
}

function showWinner(name){
  document.getElementById('winnerDisplay').textContent=name;
  const p=document.getElementById('winnerPanel');
  p.className='winner-panel'; void p.offsetWidth;
  p.className='winner-panel show';
  logCount++;
  const now=new Date();
  const time=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  logEntries.unshift({num:logCount,name,time});
  renderLog();
}

function dismissWinner(){
  document.getElementById('winnerPanel').className='winner-panel';
  winnerIdx=null;
}

function removeWinner(){
  if(winnerIdx===null) return;
  const wname=wheelSlots[winnerIdx].name;
  const p=participants.find(p=>p.name===wname);
  if(p){ p.entries--; if(p.entries<=0) participants=participants.filter(x=>x!==p); }
  buildSlots(); drawWheel(currentAngle); renderEntries(); updateCount();
  document.getElementById('winnerPanel').className='winner-panel';
  winnerIdx=null;
}

function renderLog(){
  const el=document.getElementById('logList');
  if(!logEntries.length){el.innerHTML='<div class="empty-msg">No draws yet</div>';return;}
  el.innerHTML=logEntries.map(e=>`
    <div class="log-row">
      <span class="log-num">${e.num}</span>
      <span class="log-name">${e.name}</span>
      <span class="log-time">${e.time}</span>
    </div>`).join('');
}

// Safely initialize when the DOM is fully ready
document.addEventListener('DOMContentLoaded', () => {
  canvas = document.getElementById('wc');
  ctx = canvas.getContext('2d');
  glowEl = document.getElementById('glowEl');
  
  document.getElementById('nameIn').addEventListener('keydown', e => { 
    if(e.key==='Enter') addEntry(); 
  });
  
  drawWheel(currentAngle); 
  updateCount();
});
</script>
</body>
</html>
